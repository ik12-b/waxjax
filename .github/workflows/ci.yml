name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install runtime deps (JAX CPU + Flax + testing deps)
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: '1'
        run: |
          # JAX CPU wheels served from jax_releases
          pip install --upgrade "jax[cpu]" flax -f https://storage.googleapis.com/jax-releases/jax_releases.html
          pip install torch safetensors pytest

      - name: Run tests
        run: |
          python -m pytest -q
