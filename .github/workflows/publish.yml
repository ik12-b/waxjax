name: Publish Python package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: python -m pip install --upgrade build twine

      - name: Build distributions
        run: python -m build

      - name: Upload to PyPI or TestPyPI
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          TEST_PYPI_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "Uploading to TestPyPI (prerelease)"
            python -m pip install --upgrade twine
            python -m twine upload --repository-url https://test.pypi.org/legacy/ -u __token__ -p "$TEST_PYPI_TOKEN" dist/*
          else
            echo "Uploading to PyPI (release)"
            python -m pip install --upgrade twine
            python -m twine upload -u __token__ -p "$PYPI_TOKEN" dist/*
          fi
